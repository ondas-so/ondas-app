<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>Unsubscribe</title><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{margin:0;padding:0;box-sizing:border-box;}:root{--bg-dark:#010101;--card-glass:rgba(18,18,22,0.64);--glass-stroke:rgba(255,255,255,0.06);--glass-stroke-light:rgba(255,255,245,0.1);--pure-white:#ffffff;--cream:#fef7ed;--accent-gold:#ddcaa5;--accent-gold-soft:rgba(221,202,165,0.35);--mono-light:#a7a3a0;--mono-dim:#8f8b86;--shadow-xl:0 30px 60px -20px rgba(0,0,0,0.6),0 0 0 0.5px rgba(255,255,255,0.02) inset;--transition-apple:cubic-bezier(0.23,1,0.32,1);--transition-spring:cubic-bezier(0.34,1.4,0.64,1);--radius-card:64px;--radius-pill:200px;}body{background:var(--bg-dark);color:var(--cream);font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text',Helvetica,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;position:relative;}.ambient-glow{position:fixed;inset:0;pointer-events:none;z-index:0;}.glow-1{position:absolute;top:-15%;left:-20%;width:90%;height:90%;background:radial-gradient(circle at 30% 40%,rgba(210,170,110,0.18),rgba(80,60,40,0) 70%);filter:blur(80px);animation:driftGlow 14s infinite alternate ease-in-out;}.glow-2{position:absolute;bottom:-20%;right:-15%;width:80%;height:80%;background:radial-gradient(circle,rgba(190,160,120,0.12),transparent 70%);filter:blur(100px);animation:driftGlow2 18s infinite alternate;}@keyframes driftGlow{0%{transform:translate(0,0) scale(1);opacity:0.5;}100%{transform:translate(4%,3%) scale(1.1);opacity:0.8;}}@keyframes driftGlow2{0%{transform:translate(0,0) scale(1);opacity:0.4;}100%{transform:translate(-3%,-5%) scale(1.2);opacity:0.7;}}.noise-overlay{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");pointer-events:none;z-index:1;opacity:0.45;}.nav-bar{position:fixed;top:24px;left:28px;right:28px;z-index:100;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,12,0.5);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-radius:100px;border:0.5px solid var(--glass-stroke-light);padding:8px 24px;transition:all 0.3s ease;}.logo{font-family:'Playfair Display',serif;font-weight:500;font-size:1.35rem;letter-spacing:-0.3px;background:linear-gradient(135deg,#FFF9F0,#EADBC6);background-clip:text;-webkit-background-clip:text;color:transparent;}.nav-back{font-size:0.8rem;font-weight:500;color:var(--mono-light);text-decoration:none;transition:color 0.2s var(--transition-apple);letter-spacing:0.2px;backdrop-filter:blur(4px);}.nav-back:hover{color:var(--pure-white);}main{position:relative;z-index:10;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 28px 80px;}.glass-card{max-width:520px;width:100%;background:var(--card-glass);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border-radius:80px;border:1px solid var(--glass-stroke);box-shadow:var(--shadow-xl),inset 0 1px 0 rgba(255,255,255,0.03);transition:transform 0.4s var(--transition-apple),box-shadow 0.5s ease;padding:48px 44px 52px;}.glass-card:hover{box-shadow:0 40px 70px -24px rgba(0,0,0,0.7),0 0 0 1px rgba(255,245,215,0.08) inset;}.states-stack{display:grid;}.state{grid-area:1 / 1 / 1 / 1;opacity:0;visibility:hidden;pointer-events:none;transition:opacity 0.55s cubic-bezier(0.2,0.9,0.3,1.1),visibility 0.55s;}.state.active{opacity:1;visibility:visible;pointer-events:auto;}.card-kicker{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent-gold);margin-bottom:28px;font-weight:500;}.heading-xl{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,6vw,3.4rem);font-weight:450;line-height:1.15;letter-spacing:-0.02em;color:var(--pure-white);margin-bottom:20px;}.heading-xl em{font-style:italic;color:var(--accent-gold);font-weight:500;}.body-text{font-size:0.9rem;line-height:1.6;color:var(--mono-light);font-weight:400;margin-bottom:12px;}.email-badge{font-family:'IBM Plex Mono',monospace;font-size:0.8rem;background:rgba(221,202,165,0.12);display:inline-block;padding:6px 14px;border-radius:40px;color:var(--accent-gold);letter-spacing:-0.2px;margin:16px 0 28px;backdrop-filter:blur(4px);word-break:break-all;}.btn-group{display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin-top:8px;}.btn-primary{background:var(--pure-white);border:none;padding:12px 28px;border-radius:var(--radius-pill);font-weight:600;font-size:0.85rem;font-family:inherit;letter-spacing:-0.2px;color:#0a0a0a;cursor:pointer;transition:all 0.35s var(--transition-spring);box-shadow:0 2px 8px rgba(0,0,0,0.05);}.btn-primary:hover{background:var(--accent-gold);transform:scale(0.96);box-shadow:0 6px 14px rgba(0,0,0,0.2);}.btn-primary:disabled{opacity:0.5;transform:scale(1);cursor:default;background:#b9b3a8;}.btn-ghost{background:transparent;border:none;font-size:0.8rem;font-weight:500;color:var(--mono-dim);cursor:pointer;transition:color 0.2s ease;padding:8px 6px;font-family:inherit;}.btn-ghost:hover{color:var(--pure-white);}.divider-subtle{margin:36px 0 28px;height:1px;background:radial-gradient(circle,rgba(255,255,245,0.12) 30%,transparent);}.back-link{display:inline-flex;align-items:center;gap:8px;font-size:0.8rem;font-weight:500;color:var(--mono-light);text-decoration:none;transition:all 0.25s;border-bottom:1px solid transparent;}.back-link:hover{color:var(--pure-white);border-bottom-color:var(--accent-gold);}.icon-arrow{width:16px;height:16px;transition:transform 0.2s ease;}.back-link:hover .icon-arrow{transform:translateX(4px);}.success-icon,.error-icon{width:44px;height:44px;margin-bottom:24px;}.flex-icon{display:flex;justify-content:flex-start;}.loader-dots{display:inline-block;font-size:1rem;letter-spacing:2px;}@keyframes pulseSubtle{0%{opacity:0.6;}100%{opacity:1;}}@media (max-width:550px){.glass-card{padding:36px 28px 40px;border-radius:48px;}.btn-group{flex-direction:column;align-items:stretch;}.btn-ghost{text-align:center;}.nav-bar{top:16px;left:16px;right:16px;padding:6px 20px;}}</style></head><body><div class="ambient-glow"><div class="glow-1"></div><div class="glow-2"></div></div><div class="noise-overlay"></div><nav class="nav-bar"><span class="logo">ONDAS</span><a class="nav-back" href="https://www.ondas.lat">Exit</a></nav><main><div class="glass-card"><div class="states-stack"><div class="state active" id="s-initial"><div class="card-kicker">Newsletter</div><h1 class="heading-xl">Leaving <em>already?</em></h1><p class="body-text">You’ll no longer hear from us. Take care.</p><div id="email-display-container" class="email-badge"></div><div class="btn-group"><button class="btn-primary" id="unsub-btn">Unsubscribe</button><a class="btn-ghost" href="https://www.ondas.lat">Never mind</a></div></div><div class="state" id="s-done"><div class="flex-icon"><svg class="success-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="22" stroke="#DDCAA5" stroke-width="1.2" stroke-opacity="0.7"/><path d="M14 24L21 31L34 17" stroke="#DDCAA5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><h1 class="heading-xl"><em>Unsubscribed</em></h1><p class="body-text">We’ll miss you in the room.</p><div class="divider-subtle"></div><a class="back-link notranslate" href="https://www.ondas.lat"><span>Return to ONDAS</span><svg class="icon-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a></div><div class="state" id="s-error"><div class="flex-icon"><svg class="error-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="22" stroke="#d9b48b" stroke-width="1.2"/><path d="M30 18L18 30M18 18L30 30" stroke="#d9b48b" stroke-width="1.5" stroke-linecap="round"/></svg></div><h1 class="heading-xl">Not <em>quite right</em></h1><p class="body-text" id="error-message-text">Something went wrong. Please verify the link or contact <a href="mailto:reply.ondas@gmail.com">Support</a>.</p><div class="divider-subtle"></div><a class="back-link notranslate" href="https://www.ondas.lat"><span>Back to ONDAS</span><svg class="icon-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a></div></div></div></main><script>(function() {const SUPABASE_URL = 'https://huwwsuxvehhiwpvwgqzy.supabase.co';const SUPABASE_KEY = 'sb_publishable_LCuEFxzVU9ZQLQkmAe4kuw_6tvJUpXp';const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);const stateInitial = document.getElementById('s-initial');const stateDone = document.getElementById('s-done');const stateError = document.getElementById('s-error');const emailDisplayContainer = document.getElementById('email-display-container');const unsubBtn = document.getElementById('unsub-btn');const errorMsgSpan = document.getElementById('error-message-text');function showState(stateId) {[stateInitial, stateDone, stateError].forEach(s => s.classList.remove('active'));const target = document.getElementById(stateId);if (target) target.classList.add('active');}const urlParams = new URLSearchParams(window.location.search);let email = urlParams.get('email');if (email) {email = decodeURIComponent(email).trim();} else {email = null;}if (emailDisplayContainer) {if (email && email.length > 0) {emailDisplayContainer.textContent = email;} else {emailDisplayContainer.textContent = 'no email address provided';emailDisplayContainer.style.opacity = '0.7';}}if (!email || email === '') {if (errorMsgSpan) errorMsgSpan.textContent = 'Invalid unsubscribe link. No email address was provided.';showState('s-error');if (unsubBtn) unsubBtn.disabled = true;} else {showState('s-initial');}let isProcessing = false;async function handleUnsubscribe() {if (isProcessing) return;if (!email) {showState('s-error');if (errorMsgSpan) errorMsgSpan.textContent = 'Missing email address. Cannot process request.';return;}isProcessing = true;const originalBtnText = unsubBtn.innerHTML;unsubBtn.disabled = true;unsubBtn.innerHTML = `<span class="loader-dots">——</span>`;try{const{error,data}=await supabaseClient.from('newsletter_users').update({subscribed:false}).eq('email',email).select('email,subscribed');if(error){console.error('Supabase error:',error);throw new Error(error.message||'Database error');}showState('s-done');}catch(err){console.warn('unsubscribe error',err);if(errorMsgSpan){errorMsgSpan.textContent=err?.message||JSON.stringify(err);}showState('s-error');} finally {isProcessing = false;if (unsubBtn) unsubBtn.disabled = false;if (document.getElementById('s-initial').classList.contains('active')) {unsubBtn.innerHTML = originalBtnText;}}}if (unsubBtn) {unsubBtn.addEventListener('click', handleUnsubscribe);}if (!email && errorMsgSpan) {errorMsgSpan.textContent = 'No email detected. Please use the unsubscribe link from our newsletter.';}})();</script></body></html>
